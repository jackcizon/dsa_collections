name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dsa-ci .

      - name: Ruff Lint
        run: docker run --rm dsa-ci poetry run ruff check algo/ ds/ tests/

      - name: Ruff Format Check
        run: docker run --rm dsa-ci poetry run ruff format --check algo/ ds/ tests/

      - name: mypy type check
        run: docker run --rm dsa-ci poetry run mypy

      - name: Run tests with coverage
        run: |
          docker run --rm dsa-ci poetry run coverage run -m pytest -v
          docker run --rm dsa-ci poetry run coverage report -m --fail-under=60
